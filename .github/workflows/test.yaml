name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - '*'

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6

      - name: install dependencies
        run: pnpm install
      - name: install dependencies
        run: pnpm generate
      - name: run tsc checks
        run: pnpm run build
